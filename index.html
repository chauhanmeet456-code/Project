<!DOCTYPE html>
<html>
<head>
<title>My Web Project</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  transition:0.3s;
}

/* DARK MODE */
.dark{
  background:#121212;
  color:white;
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#222;
  padding:15px 20px;
  color:white;
}

.logo{
  font-size:20px;
  font-weight:bold;
}

/* Menu */
.menu{
  display:flex;
}

.menu a{
  color:white;
  margin-left:20px;
  text-decoration:none;
  font-size:16px;
}

.menu a:hover{
  color:#00bcd4;
}

/* Hamburger */
.hamburger{
  display:none;
  font-size:24px;
  cursor:pointer;
}

/* Toggle button */
.toggle{
  background:#00bcd4;
  border:none;
  padding:8px 10px;
  cursor:pointer;
  border-radius:5px;
  margin-left:10px;
}

/* Header */
.header{
  text-align:center;
  padding:30px;
  background:#007BFF;
  color:white;
  animation:fadeIn 1s ease;
}

/* Search */
.search{
  text-align:center;
  margin:20px;
}

input{
  padding:10px;
  width:70%;
  max-width:300px;
}

button{
  padding:10px;
  cursor:pointer;
}

/* Cards */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  width:200px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  transition:0.3s;
  animation:slideUp 0.6s ease;
}

.card:hover{
  transform:translateY(-8px);
}

.card i{
  font-size:30px;
  margin-bottom:10px;
}

.dark .card{
  background:#1e1e1e;
}

.card a{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:#007BFF;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

/* Animations */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes slideUp{
  from{transform:translateY(40px); opacity:0;}
  to{transform:translateY(0); opacity:1;}
}

/* MOBILE */
@media(max-width:768px){

  .menu{
    display:none;
    flex-direction:column;
    background:#222;
    position:absolute;
    top:60px;
    left:0;
    width:100%;
    text-align:center;
  }

  .menu a{
    margin:15px 0;
  }

  .menu.active{
    display:flex;
  }

  .hamburger{
    display:block;
  }
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">My Project</div>

  <div class="menu" id="menu">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="registration.html">Register</a>
    <a href="calculator.html">Calculator</a>
    <a href="currency.html">Currency</a>
  </div>

  <div>
    <i class="fas fa-bars hamburger" id="hamburger" onclick="toggleMenu()"></i>
    <button class="toggle" onclick="toggleMode()">🌙</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <h1>My Web Project</h1>
  <p>All tools in one place</p>
</div>

<!-- Search -->
<div class="search">
  <form action="https://www.youtube.com/results">
    <input type="text" name="search_query" placeholder="Search YouTube">
    <button type="submit">Search</button>
  </form>
</div>

<!-- Cards -->
<div class="container">

  <div class="card">
    <i class="fas fa-user"></i>
    <h3>Login</h3>
    <a href="login.html">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-user-plus"></i>
    <h3>Register</h3>
    <a href="registration.html">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-calculator"></i>
    <h3>Calculator</h3>
    <a href="calculator.html">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-dollar-sign"></i>
    <h3>Currency</h3>
    <a href="currency.html">Open</a>
  </div>

</div>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}

function toggleMenu(){
  const menu = document.getElementById("menu");
  const icon = document.getElementById("hamburger");

  menu.classList.toggle("active");

  icon.classList.toggle("fa-bars");
  icon.classList.toggle("fa-times");
}
</script>

</body>
</html>
