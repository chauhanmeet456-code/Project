<!DOCTYPE html>
<html>
<head>
<title>My Web Project</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f4f4f4;
  transition:0.3s;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* DARK MODE */
.dark{
  background:#121212;
  color:white;
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#222;
  padding:15px 20px;
  color:white;
  position: relative;
}

/* Logo */
.logo{
  font-size:20px;
  font-weight:bold;
}

/* Menu */
.menu{
  display:flex;
}

.menu a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

.menu a:hover{
  color:#00bcd4;
}

/* Hamburger */
.hamburger {
  font-size: 26px;
  cursor: pointer;
  display: none;
}

/* Header */
.header{
  text-align:center;
  padding:30px;
  background:#007BFF;
  color:white;
}

/* AUTOMATIC COLOR FILL TEXT */
.header h1{
  font-size: 42px;
  font-weight: bold;
  color: white; /* normal base text */
  position: relative;
  display: inline-block;
  overflow: hidden;
}

/* moving color fill line */
.header h1::before{
  content: "My Web Project";
  position: absolute;
  top: 0;
  left: 0;
  width: 0%;
  height: 100%;
  color: red; 
  white-space: nowrap;
  overflow: hidden;
  border-right: 0px solid red; 
  animation: fillLine 4s linear infinite;
}

@keyframes fillLine{
  0%{
    width: 0%;
  }
  50%{
    width: 100%;
  }
  100%{
    width: 0%;
  }
}

/* Search */
.search{
  text-align:center;
  margin:20px;
}

input{
  padding:10px;
  width:70%;
  max-width:300px;
}

button{
  padding:10px;
  cursor:pointer;
  outline: none;
}

/* Cards */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  width:200px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.card i{
  font-size:30px;
  margin-bottom:10px;
}

.dark .card{
  background:#1e1e1e;
}

.card a{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:#007BFF;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

/* Dark Mode Button */
.dark-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00bcd4;
  color: white;
  border: none;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  z-index: 1000;
}

/* MOBILE */
@media(max-width:768px){

  /* Show hamburger */
  .hamburger{
    display: block;
    position: absolute;
    right: 20px;
    top: 18px;
  }

  /* Mobile menu */
  .menu{
    display: none;
    flex-direction: column;
    background:#222;
    position: absolute;
    top: 60px;
    right: 0;
    width: 200px;
    height: calc(100% - 60px);
    padding-top: 20px;
    text-align: center;
    z-index: 1000;
  }

  .menu.active{
    display: flex;
  }

  .menu a{
    margin:15px 0;
  }

  .header h1{
    font-size: 30px;
  }
}

.footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px 0;
    margin-top: auto;
}

.footer .social-links {
    margin-bottom: 5px;
    transition: 0.25s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
}

.footer .social-links a {
    font-size: 28px;
    transition: transform 0.3s ease, color 0.3s ease;
    display: inline-block;
}

/* Default brand colors */
.footer .social-links a.whatsapp {
    color: #129c15cc;
}

.footer .social-links a.instagram {
    color: #E1306C;
}

.footer .social-links a.github {
    color: #ffffff;
}

.footer .social-links a.linkedin {
    color: #0A66C2;
}

.footer .social-links a.telegram {
    color: #20e5f3;
}

/* Hover effect */
.footer .social-links a:hover {
    transform: translateY(-8px) scale(1.2);
}

</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">My Project</div>

  <div class="menu" id="menu">
    <a href="index.html" target="_blank">Home</a>
    <a href="login.html" target="_blank">Login</a>
    <a href="registration.html" target="_blank">Register</a>
    <a href="calculator.html" target="_blank">Calculator</a>
    <a href="currency.html" target="_blank">Currency</a>
    <a href="weather.html" target="_blank">Weather Compare</a>
  </div>

  <i class="fas fa-bars hamburger" id="hamburger" onclick="toggleMenu()"></i>
</div>

<!-- Header -->
<div class="header">
  <h1>My Web Project</h1>
</div>

<!-- Search -->
<div class="search">
  <form action="https://www.youtube.com/results" target="_blank">
    <input type="text" name="search_query" placeholder="Search YouTube">
    <button type="submit">Search</button>
  </form>
</div>

<!-- Cards -->
<div class="container">

  <div class="card">
    <i class="fas fa-user"></i>
    <h3>Login</h3>
    <a href="login.html" target="_blank">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-user-plus"></i>
    <h3>Register</h3>
    <a href="registration.html" target="_blank">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-calculator"></i>
    <h3>Calculator</h3>
    <a href="calculator.html" target="_blank">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-dollar-sign"></i>
    <h3>Currency</h3>
    <a href="currency.html" target="_blank">Open</a>
  </div>

  <div class="card">
    <i class="fa-solid fa-cloud"></i>
    <h3>Weather Compare</h3>
    <a href="weather.html" target="_blank">Open</a>
  </div>

</div>

<!-- Dark Mode Button -->
<button class="dark-toggle" onclick="toggleMode()">🌙</button>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}

function toggleMenu(){
  const menu = document.getElementById("menu");
  const icon = document.getElementById("hamburger");

  menu.classList.toggle("active");

  icon.classList.toggle("fa-bars");
  icon.classList.toggle("fa-times");
}
</script>

<!-- Footer -->
<footer class="footer">
  <div class="social-links">

    <a href="https://github.com/chauhanmeet456-code" target="_blank" title="GitHub" class="github"><i class="fab fa-github"></i></a>

  </div>

</footer>

</body>
</html>
