<!DOCTYPE html>
<html>
<head>
<title>My Web Project</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
  background-color: #f5f5f5;
}

h1{
  margin-bottom: 20px;
}

/* Search box */
.search-box{
  margin-bottom: 40px;
}

input{
  padding:10px;
  font-size:16px;
  width:250px;
}

button{
  padding:10px 15px;
  font-size:16px;
  cursor:pointer;
}

/* Navigation cards */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  width:200px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card a{
  display:block;
  margin-top:10px;
  padding:10px;
  background:#007BFF;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

.card a:hover{
  background:#0056b3;
}
</style>

</head>

<body>

<h1>My Web Project</h1>

<!-- Search -->
<div class="search-box">
  <form action="https://www.youtube.com/results">
    <input type="text" name="search_query" placeholder="Search YouTube">
    <button type="submit">Search</button>
  </form>
</div>

<!-- Cards -->
<div class="container">

  <div class="card">
    <h3>Login</h3>
    <a href="login.html">Open</a>
  </div>

  <div class="card">
    <h3>Register</h3>
    <a href="registration.html">Open</a>
  </div>

  <div class="card">
    <h3>Calculator</h3>
    <a href="calculator.html">Open</a>
  </div>

  <div class="card">
    <h3>Currency</h3>
    <a href="currency.html">Open</a>
  </div>

</div>

</body>
</html>
